<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS互動模擬測驗1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 客製化滾動條以提升專業感 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .correct-answer { background-color: #dcfce7; border-color: #22c55e; }
        .wrong-answer { background-color: #fee2e2; border-color: #ef4444; }
        
        /* 閱讀區域的左右分割 */
        @media (min-width: 1024px) {
            .split-view { display: flex; height: calc(100vh - 250px); }
            .split-pane { flex: 1; overflow-y: auto; padding: 1.5rem; }
            .split-pane:first-child { border-right: 2px solid #e2e8f0; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex flex-col">

    <header class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center z-10 shrink-0">
        <div>
            <h1 class="text-xl font-bold tracking-wider">IELTS互動模擬測驗1</h1>
        </div>
        <div class="flex items-center space-x-4">
            <div class="bg-blue-800 px-4 py-2 rounded-lg font-mono text-xl shadow-inner flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span id="timer">02:30:00</span>
            </div>
        </div>
    </header>

    <nav class="bg-white shadow-sm shrink-0 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <div class="flex space-x-8" aria-label="Tabs">
                <button onclick="switchTab('listening')" id="tab-listening" class="tab-btn active border-blue-500 text-blue-600 border-b-2 py-4 px-1 text-center font-medium text-lg focus:outline-none transition">
                    🎧 聽力 (30 mins)
                </button>
                <button onclick="switchTab('reading')" id="tab-reading" class="tab-btn border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 border-b-2 py-4 px-1 text-center font-medium text-lg focus:outline-none transition">
                    📖 閱讀 (60 mins)
                </button>
                <button onclick="switchTab('writing')" id="tab-writing" class="tab-btn border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 border-b-2 py-4 px-1 text-center font-medium text-lg focus:outline-none transition">
                    ✍️ 寫作 (60 mins)
                </button>
            </div>
            <div class="flex items-center space-x-2 bg-gray-100 p-1 rounded-lg">
                <button id="mode-academic" onclick="setMode('academic')" class="px-4 py-1.5 rounded-md bg-white shadow text-sm font-bold text-blue-800 transition">Academic (學術組)</button>
                <button id="mode-general" onclick="setMode('general')" class="px-4 py-1.5 rounded-md text-sm font-bold text-gray-500 hover:text-gray-800 transition">General (移民組)</button>
            </div>
        </div>
    </nav>

    <div class="bg-indigo-50 border-b border-indigo-100 p-3 shrink-0 z-20 shadow-sm flex flex-wrap justify-center gap-4 items-center" id="student-info-bar">
        <span class="font-bold text-indigo-900 text-lg">📝 考生資訊 (必填)：</span>
        <input type="text" id="student-id" placeholder="學員編號" class="border border-indigo-200 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none w-32 md:w-48 shadow-inner transition-colors duration-300">
        <input type="text" id="student-branch" placeholder="分校" class="border border-indigo-200 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none w-32 md:w-48 shadow-inner transition-colors duration-300">
        <input type="text" id="student-name" placeholder="姓名" class="border border-indigo-200 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none w-32 md:w-48 shadow-inner transition-colors duration-300">
    </div>

    <main class="flex-1 overflow-hidden relative">
        <div class="max-w-7xl mx-auto h-full">

            <div id="content-listening" class="tab-content active h-full overflow-y-auto p-6">
                <div id="listening-sections" class="space-y-8">
                    </div>
                
                <div class="mt-8 pt-6 border-t border-gray-200 flex flex-col items-center pb-8">
                    <button onclick="nextToReading()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-12 rounded-lg shadow-lg transition duration-200 text-xl w-full max-w-lg flex items-center justify-center">
                        前往閱讀測驗 (Next: Reading) <svg class="w-6 h-6 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                    <div id="listening-score-display" class="hidden mt-6 text-center text-2xl font-bold text-blue-800 bg-blue-100 px-8 py-4 rounded-xl shadow-inner border border-blue-200 w-full max-w-lg"></div>
                </div>
            </div>

            <div id="content-reading" class="tab-content h-full">
                <div class="split-view bg-white shadow-sm border-x border-b border-gray-200">
                    <div class="split-pane bg-gray-50" id="reading-passage">
                        </div>
                    <div class="split-pane bg-white pb-12">
                        <h3 class="text-2xl font-bold mb-6 text-blue-900 border-b-2 border-blue-100 pb-3">Questions (40 Items)</h3>
                        <div id="reading-questions" class="space-y-8">
                            </div>
                        
                        <div class="mt-10 pt-6 border-t border-gray-200 pb-8 flex flex-col items-center">
                            <button onclick="nextToWriting()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-12 rounded-lg shadow-lg transition duration-200 text-xl w-full max-w-lg flex items-center justify-center">
                                前往寫作測驗 (Next: Writing) <svg class="w-6 h-6 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                            <div id="reading-score-display" class="hidden mt-6 text-center text-2xl font-bold text-blue-800 bg-blue-100 px-8 py-4 rounded-xl shadow-inner border border-blue-200 w-full max-w-lg"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="content-writing" class="tab-content h-full overflow-y-auto p-6">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-8">
                    <div class="flex justify-between items-start mb-4 border-b pb-4">
                        <h2 class="text-2xl font-bold text-gray-900">Writing Task 1</h2>
                        <span class="bg-gray-200 text-gray-800 px-4 py-1.5 rounded-full text-sm font-bold shadow-inner">Suggested time: 20 mins</span>
                    </div>
                    <div class="bg-gray-50 border border-gray-200 p-5 rounded-lg mb-6 shadow-sm">
                        <p id="writing-task1-prompt" class="font-medium text-gray-800 text-lg leading-relaxed"></p>
                        <div id="writing-task1-data-container" class="mt-6 bg-white border border-gray-300 p-4 rounded hidden">
                            <p id="writing-task1-data-title" class="font-bold mb-2 text-gray-700 text-center text-lg">Data Visualization</p>
                            <ul id="writing-task1-data" class="list-disc pl-5 space-y-1 text-gray-600 hidden"></ul>
                            <div class="relative w-full h-80 flex justify-center">
                                <canvas id="task1-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    
                    <textarea id="task1-input" class="w-full h-56 p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none text-lg leading-relaxed shadow-inner" placeholder="Write your answer here (minimum 150 words)..."></textarea>
                    <div class="flex justify-between items-center mt-3 mb-6">
                        <span class="text-sm font-semibold text-gray-500 bg-gray-100 px-3 py-1 rounded">Word count: <span id="task1-word-count" class="text-blue-600">0</span></span>
                    </div>

                    <div id="task1-sample" class="hidden mt-4 p-6 bg-green-50 border-2 border-green-200 rounded-xl text-gray-800 leading-relaxed text-lg shadow-sm"></div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-8">
                    <div class="flex justify-between items-start mb-4 border-b pb-4">
                        <h2 class="text-2xl font-bold text-gray-900">Writing Task 2</h2>
                        <span class="bg-gray-200 text-gray-800 px-4 py-1.5 rounded-full text-sm font-bold shadow-inner">Suggested time: 40 mins</span>
                    </div>
                    <div class="bg-gray-50 border border-gray-200 p-5 rounded-lg mb-6 shadow-sm">
                        <p id="writing-task2-prompt" class="font-medium text-gray-800 text-lg leading-relaxed"></p>
                    </div>
                    
                    <textarea id="task2-input" class="w-full h-72 p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none text-lg leading-relaxed shadow-inner" placeholder="Write your essay here (minimum 250 words)..."></textarea>
                    <div class="flex justify-between items-center mt-3 mb-6">
                        <span class="text-sm font-semibold text-gray-500 bg-gray-100 px-3 py-1 rounded">Word count: <span id="task2-word-count" class="text-blue-600">0</span></span>
                    </div>

                    <div id="task2-sample" class="hidden mt-4 p-6 bg-green-50 border-2 border-green-200 rounded-xl text-gray-800 leading-relaxed text-lg shadow-sm"></div>
                </div>

                <div class="mt-8 pt-6 border-t border-gray-200 flex flex-col items-center pb-12">
                    <button id="submit-all-btn" onclick="gradeAll()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-12 rounded-lg shadow-lg transition duration-200 text-xl w-full max-w-lg tracking-wide">
                        📝 提交全卷並查看成績
                    </button>
                    <div id="writing-score-display" class="hidden mt-6 text-left text-lg bg-blue-50 p-8 rounded-xl shadow-inner border border-blue-200 w-full"></div>
                </div>

            </div>
        </div>
    </main>

    <div id="final-submission-banner" class="fixed bottom-0 left-0 w-full bg-indigo-900 text-white p-4 shadow-2xl flex flex-col md:flex-row justify-between items-center z-50 border-t-4 border-yellow-400 transform transition-transform translate-y-full hidden">
        <div class="flex flex-wrap items-center gap-4 md:gap-6 mb-4 md:mb-0">
            <span class="text-xl font-bold text-yellow-300">🎉 測驗完成！你的成績：</span>
            <span class="text-lg">聽力: <strong id="summary-l" class="text-blue-300">-</strong></span>
            <span class="text-lg">閱讀: <strong id="summary-r" class="text-blue-300">-</strong></span>
            <span class="text-lg">寫作: <strong id="summary-w" class="text-blue-300">-</strong></span>
            <span class="text-2xl font-black text-green-400 ml-2 md:ml-4 border-l-2 border-indigo-700 pl-4">Overall: <span id="summary-overall">-</span></span>
        </div>
        <div class="flex items-center gap-4">
            <span id="submit-msg" class="font-bold text-yellow-300 hidden"></span>
            <button id="submit-formspree-btn" onclick="submitToFormspree()" class="bg-green-500 hover:bg-green-400 text-indigo-900 font-bold py-2 px-6 rounded-full shadow-lg transition duration-200 text-lg animate-pulse border-2 border-white">
                回傳成績 (必按)
            </button>
        </div>
    </div>

    <script>
        // 記錄當前模式 (academic 或 general)
        let currentMode = 'academic';
        let timerInterval;
        
        // 全局紀錄成績
        window.testScores = {
            listening: null,
            reading: null,
            writing: null,
            overall: null
        };

        /**
         * 系統核心資料庫 (第一套內容 - 折線圖)
         */
        const ieltsData = {
            listening: {
                sections: [
                    {
                        title: "PART 1",
                        instruction: "Questions 1-10<br>Listen to a telephone conversation between a customer and an adventure tour agent. Complete the form below.<br>Write NO MORE THAN TWO WORDS AND/OR A NUMBER for each answer.",

                            <strong>Agent:</strong> Good morning, Peak Adventure Tours. This is Sarah speaking. How can I help you?<br>

                            <strong>Agent:</strong> Let me check our schedule for the 12th. Yes, we have two tours running. The forest walk or the mountain trail. Which one do you prefer?<br>
                            <strong>Customer:</strong> The <strong>mountain</strong> trail sounds more exciting.<br>
                            <strong>Agent:</strong> Great choice. How many people will be in your group?<br>
                            <strong>Customer:</strong> It will just be me and two friends, so <strong>3</strong> people in total.<br>
                            <strong>Agent:</strong> Okay. We provide a packed lunch for the hike. Are there any special dietary requirements?<br>
                            <strong>Customer:</strong> Yes, one of my friends is a <strong>vegan</strong>.<br>
                            <strong>Agent:</strong> No problem, I'll make a note of that. The cost for the mountain tour is £<strong>85</strong> per person.<br>
                            <strong>Customer:</strong> That's fine. <br>
                            <strong>Agent:</strong> Could I have your full name for the booking, Mark?<br>
                            <strong>Customer:</strong> It's Mark <strong>Jackson</strong>. J-A-C-K-S-O-N.<br>
                            <strong>Agent:</strong> Thank you. And an email address to send the itinerary to?<br>
                            <strong>Customer:</strong> Send it to m.jackson at <strong>web.com</strong>.<br>
                            <strong>Agent:</strong> And your mobile number?<br>
                            <strong>Customer:</strong> It's <strong>078344552</strong>.<br>
                            <strong>Agent:</strong> Perfect. Just to remind you, while we provide walking poles, everyone must bring their own hiking <strong>boots</strong>.<br>
                            <strong>Customer:</strong> We have those. Where do we meet in the morning?<br>
                            <strong>Agent:</strong> We will pick you up outside the main train <strong>station</strong> at 8 AM sharp.<br>
                            <strong>Customer:</strong> Sounds wonderful. I'll pay by card now.
                        `,
                        questions: [
                            {
                                type: 'fill', id: 'L_S1',
                                text: 'Complete the booking form. (Q1 - Q10)',
                                subQuestions: [
                                    { id: 'L_S1_1', prefix: '1. Date of Tour: October', suffix: '', answer: '12th', explanation: '顧客提到 "We are aiming for the 12th of October"。' },

                                    { id: 'L_S1_5', prefix: '5. Price per person: £', suffix: '', answer: '85', explanation: '業務報價 "£85 per person"。' },
                                    { id: 'L_S1_6', prefix: '6. Customer Surname:', suffix: '', answer: 'jackson', explanation: '拼字為 J-A-C-K-S-O-N。' },
                                    { id: 'L_S1_7', prefix: '7. Email: m.jackson @', suffix: '', answer: 'web.com', explanation: 'Email 後半段為 web.com。' },
                                    { id: 'L_S1_8', prefix: '8. Phone Number:', suffix: '', answer: '078344552', explanation: '電話為 078344552。' },
                                    { id: 'L_S1_9', prefix: '9. Essential equipment to bring: Hiking', suffix: '', answer: 'boots', explanation: '業務提醒每個人都必須自己帶 hiking "boots"。' },
                                    { id: 'L_S1_10', prefix: '10. Pick-up location: Main train', suffix: '', answer: 'station', explanation: '集合地點在 main train "station" 站外。' }
                                ]
                            }
                        ]
                    },
                    {
                        title: "PART 2",
                        instruction: "Questions 11-20<br>Listen to a guide introducing a new wildlife park. Answer the questions.",
                        transcript: `
                            <strong>Guide:</strong> Welcome, everyone, to the Green Valley Wildlife Park. We are very proud of our conservation efforts. The primary reason this park was established wasn't for entertainment, but rather to breed endangered species and release them back into the wild.<br>

                                answer: 'B',
                                explanation: '導遊提到下週有 "a falconry flying display" (獵鷹飛行表演)。'

                                options: ['North', 'South', 'East', 'West', 'Centre'],
                                subQuestions: [
                                    { id: 'L_S2_16', text: '16. Lions', answer: 'North', explanation: '獅子位於公園的 North side。' },

                    },
                    {
                        title: "PART 3",
                        instruction: "Questions 21-30<br>Read the transcript of two students, John and Emma, discussing their marine biology project with their tutor, Dr. Adams. Answer the questions.",
                        transcript: `
                            <strong>John:</strong> Dr. Adams, we've collected the data for our coral reef project. We compared two reefs off the coast. The biggest obstacle during our diving wasn't the strong currents, but actually dealing with equipment failure underwater.<br>
                            <strong>Emma:</strong> Yes, my camera flooded twice. Initially, we hypothesized that pollution from the nearby town would be the main cause of coral bleaching. However, our water samples proved that a sudden rise in water temperature was the primary culprit.<br>
                            <strong>Dr. Adams:</strong> That aligns with global trends. And what about the fish populations in the bleached areas?<br>
                            <strong>John:</strong> Well, the larger predatory fish disappeared almost immediately. But surprisingly, the population of herbivorous fish actually increased in the short term, because algae quickly grew over the dead coral.<br>

                            },
                            {
                                type: 'mcq', id: 'L_S3_23',
                                text: '23. Why did the population of herbivorous fish increase?',
                                options: ['A) The predators disappeared.', 'B) Algae grew over the dead coral.', 'C) The water became warmer.'],
                                answer: 'B',
                                explanation: 'John 解釋草食魚類增加是因為 "algae quickly grew over the dead coral" (藻類在死珊瑚上生長，提供了食物)。'
                            },
                            {
                                type: 'mcq', id: 'L_S3_24',
                                text: '24. What specific part of the thesis will John write?',
                                options: ['A) The discussion chapter', 'B) The conclusion', 'C) The introduction'],

                                explanation: 'John 說他會負責 "write the introduction and format the data tables"。'
                            },
                            {
                                type: 'mcq', id: 'L_S3_25',

                            title: "Passage 1: The Evolution of Cartography",
                            passage: `
                                <p class="mb-4">Cartography, the art and science of making maps, has been fundamental to human survival and exploration for millennia. The earliest known maps were not drawn on paper but carved into stone or painted on cave walls. These primitive representations, dating back over 10,000 years, typically depicted local terrain, hunting grounds, or the position of stars. Unlike modern maps that prioritize geographical accuracy, ancient maps were often deeply intertwined with religion and mythology, placing the mapmaker's homeland or a sacred site at the exact center of the world.</p>
                                <p class="mb-4">The Greeks were the first to apply rigorous mathematics to cartography. In the 2nd century AD, the scholar Claudius Ptolemy compiled a massive work called 'Geography', which introduced the concept of latitude and longitude. Ptolemy recognized that the Earth was spherical and devised projection methods to represent its curved surface on a flat plane. Although his maps contained significant errors—most notably, grossly underestimating the circumference of the Earth—his coordinate system laid the foundation for all modern cartography.</p>
                                <p class="mb-4">The Age of Discovery in the 15th and 16th centuries spurred a massive leap in mapmaking. As European explorers sailed across uncharted oceans, accurate navigation became a matter of life and death. In 1569, Gerardus Mercator introduced his famous 'Mercator projection'. This map was revolutionary because it represented lines of constant bearing (rhumb lines) as straight segments, making it incredibly useful for sailors navigating by compass. However, the Mercator projection severely distorts the size of landmasses near the poles, making regions like Greenland appear almost as large as Africa, despite being vastly smaller in reality.</p>

                            passage: `
                                <p class="mb-4">Understanding what drives human behavior is a core focus of psychology. Motivation is generally divided into two broad categories: extrinsic and intrinsic. Extrinsic motivation refers to behavior that is driven by external rewards such as money, fame, grades, or praise. In contrast, intrinsic motivation arises from within the individual; it is the desire to perform an activity for its own sake, out of pure enjoyment or personal satisfaction. For decades, behavioral psychologists, heavily influenced by B.F. Skinner, argued that external reinforcements (rewards and punishments) were the only reliable way to shape human behavior.</p>
                                <p class="mb-4">However, in the 1970s, psychologist Edward Deci challenged this prevailing view with a controversial theory known as the "overjustification effect." Deci conducted experiments showing that when individuals are offered external rewards for tasks they already find intrinsically rewarding, their internal motivation actually decreases. In a classic study, children who loved drawing were divided into two groups. One group was promised a "Good Player" certificate for drawing, while the other was not. Weeks later, the children who had received the external reward spent significantly less time drawing on their own than those who received nothing. The introduction of the extrinsic reward transformed a fun activity into "work."</p>
                                <p class="mb-4">Modern workplace psychology now heavily emphasizes intrinsic motivation. While a fair salary is essential to prevent dissatisfaction, it is not enough to guarantee high performance and innovation. Management theories, such as Daniel Pink’s, suggest that true motivation in complex, creative jobs relies on three elements: autonomy (the desire to direct our own lives), mastery (the urge to get better at something that matters), and purpose (the yearning to do what we do in the service of something larger than ourselves). Companies that focus on cultivating these intrinsic drivers consistently outperform those that rely solely on financial bonuses.</p>

                            title: "Passage 3: The Menace of Space Debris",
                            passage: `
                                <p class="mb-4">Since the launch of Sputnik 1 in 1957, humanity has been relentlessly launching satellites and rockets into Earth's orbit. However, this rapid colonization of space has generated a massive environmental problem: space debris, commonly known as space junk. Currently, the United States Space Surveillance Network tracks over 27,000 pieces of orbital debris larger than a softball. However, experts estimate there are over 100 million smaller fragments, ranging from paint flecks to solid rocket motor slag, whizzing around the Earth at speeds exceeding 17,500 miles per hour. At such extreme velocities, even a millimeter-sized fleck of paint possesses the kinetic energy of a rifle bullet, capable of severely damaging vital communication satellites or the International Space Station (ISS).</p>
                                <p class="mb-4">The greatest fear regarding space debris is a theoretical scenario known as the "Kessler Syndrome," proposed by NASA scientist Donald Kessler in 1978. Kessler warned that as the density of space junk increases, the likelihood of a collision also rises. A single major collision between two large satellites would generate thousands of new high-speed fragments. These fragments would then strike other satellites, creating a cascading chain reaction of destruction. If the Kessler Syndrome is triggered, low Earth orbit (LEO) could become so saturated with lethal debris that it would be too dangerous to launch new satellites or human missions for centuries, effectively trapping humanity on Earth.</p>
                                <p class="mb-4">Addressing the space debris crisis requires international cooperation and innovative engineering. Mitigation guidelines are already in place, such as designing rockets that do not shed parts and ensuring satellites have enough fuel at the end of their lifespan to forcefully de-orbit and burn up in Earth's atmosphere. However, cleaning up the existing junk is far more challenging. Proposed solutions range from deploying giant orbital nets and harpoons to catch dead satellites, to using ground-based lasers to heat debris, causing it to slow down and fall out of orbit. Despite these creative concepts, no large-scale active debris removal mission has yet been fully implemented due to astronomical costs and complex international legal disputes over the ownership of dead satellites.</p>

            if (!engVoices || engVoices.length === 0) return null;
            let gbVoices = engVoices.filter(v => v.lang === 'en-GB');
            let pool = gbVoices.length > 0 ? gbVoices : engVoices;
            
            if (profile.gender === 'female') {
                return pool.find(v => v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('woman')) || pool[0];
            } else if (profile.gender === 'male') {
                return pool.find(v => v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('man')) || pool[pool.length - 1];
            }
            return pool[0];
        }

        function parseDialogue(htmlContent) {
            let tmp = document.createElement("div");
            tmp.innerHTML = htmlContent;
            
            let dialogues = [];
            let currentSpeaker = "Narrator";
            let currentText = "";

            tmp.childNodes.forEach(node => {
                if (node.nodeName === 'STRONG' && node.textContent.trim().endsWith(':')) {
                    if (currentText.trim()) {
                        dialogues.push({ speaker: currentSpeaker, text: currentText.trim() });
                    }
                    currentSpeaker = node.textContent.replace(':', '').trim();
                    currentText = "";
                } else if (node.nodeName === 'BR') {
                    currentText += " ";
                } else {
                    currentText += node.textContent || "";
                }
            });
            
            if (currentText.trim()) {
                dialogues.push({ speaker: currentSpeaker, text: currentText.trim() });
            }
            
            return dialogues;
        }

                    utterance.lang = 'en-GB';
                    utterance.pitch = profile.pitch;
                    utterance.rate = profile.rate;
                    
                    let voice = getVoiceForProfile(profile);
                    if (voice) utterance.voice = voice;
                    
                    window.speechSynthesis.speak(utterance);

        // 依據雅思官方 40 題對照表計算 Band Score
        function calculateBand(score, type, mode = 'academic') {
            if (score === 0) return 0.0; 
            
            if (type === 'listening' || (type === 'reading' && mode === 'academic')) {
                if (score >= 39) return 9.0;
                if (score >= 37) return 8.5;
                if (score >= 35) return 8.0;
                if (score >= 33) return 7.5;
                if (score >= 30) return 7.0;
                if (score >= 27) return 6.5;
                if (score >= 23) return 6.0;
                if (score >= 20) return 5.5;
                if (score >= 16) return 5.0;
                if (score >= 13) return 4.5;
                if (score >= 10) return 4.0;
                if (score >= 6) return 3.5;
                if (score >= 4) return 3.0;
                if (score === 3) return 2.5;
                if (score === 2) return 2.0;
                if (score === 1) return 1.0;
            } 
            else if (type === 'reading' && mode === 'general') {
                if (score === 40) return 9.0;
                if (score === 39) return 8.5;
                if (score === 38) return 8.0;
                if (score >= 36) return 7.5;
                if (score >= 34) return 7.0;
                if (score >= 32) return 6.5;
                if (score >= 30) return 6.0;
                if (score >= 26) return 5.5;
                if (score >= 23) return 5.0;
                if (score >= 19) return 4.5;
                if (score >= 15) return 4.0;
                if (score >= 12) return 3.5;
                if (score >= 8) return 3.0;
                if (score >= 5) return 2.5;
                if (score >= 2) return 2.0;
                if (score === 1) return 1.0;
            }
            return 0.0;
        }

        function showFeedback(id, isCorrect, correctAnswer, explanation) {
            const expDiv = document.getElementById(`exp-${id}`);
            if (!expDiv) return;

            expDiv.classList.remove('hidden');
            if (isCorrect) {
                expDiv.classList.add('correct-answer');
                expDiv.classList.remove('wrong-answer');
                expDiv.innerHTML = `<strong class="text-green-700 text-lg">✅ Correct!</strong><br><span class="text-gray-800 mt-2 block">${explanation}</span>`;
            } else {
                expDiv.classList.add('wrong-answer');
                expDiv.classList.remove('correct-answer');
                expDiv.innerHTML = `<strong class="text-red-700 text-lg">❌ Incorrect. The correct answer is: ${correctAnswer}</strong><br><span class="text-gray-800 mt-2 block">${explanation}</span>`;
            }
        }

        function gradeListeningLogic() {
            let score = 0;
            ieltsData.listening.sections.forEach(sec => {
                sec.questions.forEach(q => {
                    if (q.type === 'mcq') {
                        const selected = document.querySelector(`input[name="${q.id}"]:checked`);
                        const val = selected ? selected.value : null;
                        const isCorrect = val === q.answer;
                        if (isCorrect) score++;
                        showFeedback(q.id, isCorrect, q.answer, q.explanation);
                    } else if (q.type === 'matching' || q.type === 'fill') {
                        q.subQuestions.forEach(sq => {
                            const inputEl = document.getElementById(sq.id);
                            if (!inputEl) return;
                            const val = inputEl.value.trim().toLowerCase();
                            const ans = sq.answer.toLowerCase();

        function evaluateEssay(text, taskType) {
            if (!text || !text.trim()) return { score: 0.0, feedback: "未作答 (No answer provided)" };

            let words = text.trim().split(/\s+/);
            let wordCount = words.length;
            
            // 防呆機制：如果字數極低
            if (wordCount < 10) {
                return { score: 1.0, feedback: "字數極少，無法評估 (Insufficient words for assessment) (-4.0)" };
            }
            
            let score = 5.0;
            let feedback = [];

            if (taskType === 1) {
                if (wordCount < 100) { score -= 1.5; feedback.push("字數嚴重不足 (-1.5)"); }
                else if (wordCount < 150) { score -= 0.5; feedback.push("未達 150 字最低要求 (-0.5)"); }
                else if (wordCount >= 200) { score += 0.5; feedback.push("字數充裕且圖表細節發展完整 (+0.5)"); }
                else { feedback.push("字數達最低標準 (+0)"); }
            } else {
                if (wordCount < 150) { score -= 1.5; feedback.push("字數嚴重不足 (-1.5)"); }
                else if (wordCount < 250) { score -= 0.5; feedback.push("未達 250 字最低要求 (-0.5)"); }
                else if (wordCount >= 320) { score += 0.5; feedback.push("字數充裕且論點發展充分 (+0.5)"); }
                else { feedback.push("字數達最低標準 (+0)"); }
            }

            const advancedWords = ['furthermore', 'moreover', 'however', 'nevertheless', 'consequently', 'subsequently', 'undeniably', 'inevitably', 'significant', 'substantial', 'demonstrate', 'illustrate', 'conversely', 'profound', 'crucial', 'vital', 'essential', 'perspective', 'contend', 'assert', 'mitigate', 'detrimental', 'beneficial', 'advantageous', 'overall', 'in conclusion', 'to summarize', 'whereas', 'although', 'despite', 'therefore', 'thus', 'hence', 'indicate', 'suggest', 'imply', 'facilitate', 'hinder', 'exacerbate', 'ameliorate', 'predominantly', 'notably'];
            let advancedCount = 0;
            let lowerText = text.toLowerCase();
            advancedWords.forEach(word => {
                if (lowerText.includes(word)) advancedCount++;
            });

            if (advancedCount < 3) { score -= 0.5; feedback.push("缺乏進階學術與轉折詞彙 (-0.5)"); }
            else if (advancedCount >= 6 && advancedCount < 10) { score += 0.5; feedback.push("使用了部分學術與轉折詞彙 (+0.5)"); }
            else if (advancedCount >= 10 && advancedCount < 15) { score += 1.0; feedback.push("學術詞彙與轉折語氣運用良好 (+1.0)"); }
            else if (advancedCount >= 15) { score += 1.5; feedback.push("連接詞與進階詞彙極其豐富 (+1.5)"); }
            else { feedback.push("基礎詞彙運用尚可 (+0)"); }

            let paragraphs = text.split(/\n+/).filter(p => p.trim().length > 0);
            if (paragraphs.length < 2) {
                score -= 1.0; feedback.push("文章完全沒有分段 (-1.0)");
            } else if (paragraphs.length === 2) {
                score -= 0.5; feedback.push("段落結構過於簡單 (-0.5)");
            } else if (paragraphs.length >= 4 && paragraphs.length <= 6) {
                score += 0.5; feedback.push("具備良好的多段落邏輯結構 (+0.5)");
            } else {
                feedback.push("具備基本分段 (+0)");
            }

            let sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
            if (sentences.length > 0) {
                let avgSentenceLength = wordCount / sentences.length;
                if (avgSentenceLength < 10) { score -= 0.5; feedback.push("句型過短，缺乏複合句 (-0.5)"); }
                else if (avgSentenceLength > 16) { score += 0.5; feedback.push("句型長度與複雜句結構佳 (+0.5)"); }
                else { feedback.push("句型長度適中 (+0)"); }
            }

            if (score > 8.0) score = 8.0;
            if (score < 1.0) score = 1.0;
            score = Math.round(score * 2) / 2;

            return { score: score, feedback: feedback.join('、') };
        }

                document.getElementById('student-info-bar').scrollIntoView({ behavior: 'smooth', block: 'center' });
                if (!studentId) document.getElementById('student-id').classList.add('ring-2', 'ring-red-500');
                if (!branch) document.getElementById('student-branch').classList.add('ring-2', 'ring-red-500');
                if (!name) document.getElementById('student-name').classList.add('ring-2', 'ring-red-500');
                
                // 3秒後移除紅框
                setTimeout(() => {
                    document.querySelectorAll('input').forEach(el => el.classList.remove('ring-2', 'ring-red-500'));
                }, 3000);
                
                return; // 中斷結算程式，不會顯示成績
            }

            if (!confirm("確定要提交全卷嗎？\n提交後將無法修改答案，並會顯示所有科目的成績與詳解。")) {
                return;
            }

            // 停止計時
            if(timerInterval) clearInterval(timerInterval);
            
            // 計算三科分數並把 DOM 回饋塞入
            gradeListeningLogic();
            gradeReadingLogic();
            gradeWritingLogic();

            // 計算 Overall Band
            let overall = (window.testScores.listening + window.testScores.reading + window.testScores.writing) / 3;
            overall = Math.round(overall * 2) / 2;
            window.testScores.overall = overall;

            // 更新下方成績單看板
            document.getElementById('summary-l').textContent = window.testScores.listening.toFixed(1);
            document.getElementById('summary-r').textContent = window.testScores.reading.toFixed(1);
            document.getElementById('summary-w').textContent = window.testScores.writing.toFixed(1);
            document.getElementById('summary-overall').textContent = window.testScores.overall.toFixed(1);

            const banner = document.getElementById('final-submission-banner');
            banner.classList.remove('hidden', 'translate-y-full');
            banner.classList.add('translate-y-0');

            // 鎖定全卷提交按鈕防呆
            const btn = document.getElementById('submit-all-btn');
            btn.disabled = true;
            btn.textContent = "✅ 已結算全卷成績";
            btn.classList.add('cursor-not-allowed', 'opacity-75');
            btn.classList.remove('hover:bg-red-700');
        }

        /* ================= 發送成績至 Formspree ================= */
        async function submitToFormspree() {
            const studentId = document.getElementById('student-id').value.trim();
            const branch = document.getElementById('student-branch').value.trim();
            const name = document.getElementById('student-name').value.trim();
            const msgEl = document.getElementById('submit-msg');
            const btn = document.getElementById('submit-formspree-btn');

            btn.disabled = true;
            btn.classList.remove('animate-pulse');
            btn.textContent = "發送中...";
            msgEl.classList.add('hidden');

            const payload = {
                "學員編號 (Student ID)": studentId,
                "分校 (Branch)": branch,
                "姓名 (Name)": name,
                "聽力成績 (Listening)": window.testScores.listening,
                "閱讀成績 (Reading)": window.testScores.reading,
                "寫作成績 (Writing)": window.testScores.writing,
                "雅思總級分 (Overall Band)": window.testScores.overall
            };

            try {
                const response = await fetch("https://formspree.io/f/xreraowb", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    msgEl.textContent = "✅ 成績已成功寄出！";
                    msgEl.classList.remove('hidden', 'text-yellow-300');
                    msgEl.classList.add('text-green-400');
                    btn.textContent = "已寄送";
                    btn.classList.add('opacity-50', 'cursor-not-allowed');
                } else {
                    throw new Error("Network response was not ok.");
                }
            } catch (error) {
                console.error(error);
                msgEl.textContent = "❌ 發送失敗，請檢查網路連線";
                msgEl.classList.remove('hidden', 'text-green-400');
                msgEl.classList.add('text-yellow-300');
                btn.disabled = false;
                btn.textContent = "重新寄送";
                btn.classList.add('animate-pulse');
            }
        }
    </script>
</body>
</html>
